name: Android CI/CD Pipeline

# Controls when the workflow will run
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build & Test Application
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the repository code
      - name: Checkout Code
        uses: actions/checkout@v4

      # Step 2: Set up Java 17 (Required for modern Gradle/Kotlin toolchains)
      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      # Step 3: Grant execute permission for the Gradle wrapper script
      - name: Grant Execute Permission for Gradlew
        run: chmod +x gradlew

      # Step 4: Run Code Quality Checks (Lint) and Unit Tests
      - name: Run Tests & Linters
        run: ./gradlew lintDebug testDebugUnitTest

      # Step 5: Assemble Debug APK and AAB
      - name: Build Debug Artifacts
        run: ./gradlew assembleDebug bundleDebug

      # Step 6: Upload the generated APK so you can download it from the cloud
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: rick-and-morty-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7

      # Step 7: Upload the generated AAB (App Bundle)
      - name: Upload AAB Artifact
        uses: actions/upload-artifact@v4
        with:
          name: rick-and-morty-debug-aab
          path: app/build/outputs/bundle/debug/app-debug.aab
          retention-days: 7

      # Step 8: Distribute the APK to your Firebase Tester Group
      - name: Upload to Firebase App Distribution
        uses: w9jds/firebase-action@v2.2.2
        with:
          args: appdistribution:distribute app/build/outputs/apk/debug/app-debug.apk --app ${{ secrets.FIREBASE_APP_ID }} --groups "rnm-universe-testers"
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}